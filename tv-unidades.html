<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - USF Cristo Redentor</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #002b5c; color: white; font-family: sans-serif; text-align: center; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .topo { background: #001a38; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #ffcc00; }
        .unidade-nome h1 { font-size: 1.8rem; margin: 0; color: white; letter-spacing: 1px; font-weight: 900; }
        .relogio { font-size: 3.5rem; color: #ffcc00; font-weight: bold; font-family: 'Courier New', monospace; }
        .layout-principal { display: flex; flex-grow: 1; overflow: hidden; }
        .area-chamada { flex: 3; display: flex; flex-direction: column; justify-content: center; position: relative; border-right: 2px solid rgba(255,255,255,0.1); }
        .area-lateral { flex: 1; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; padding: 20px; }
        .paciente { font-size: 7.5rem; font-weight: bold; color: #ffcc00; text-transform: uppercase; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); }
        .sala { font-size: 4.5rem; background: white; color: #002b5c; padding: 10px 40px; border-radius: 20px; display: inline-block; margin-top: 20px; font-weight: bold; border: 4px solid #ffcc00; }
        .hist-titulo { font-size: 1.5rem; color: #ffcc00; border-bottom: 2px solid #ffcc00; padding-bottom: 10px; margin-bottom: 15px; }
        .hist-item-tv { background: rgba(255,255,255,0.1); margin-bottom: 10px; padding: 15px; border-radius: 10px; text-align: left; animation: slideIn 0.5s ease; }
        .hist-item-tv b { font-size: 1.4rem; color: #fff; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes flash { 0%, 100% { background-color: #002b5c; } 50% { background-color: #ffcc00; } }
        .piscar { animation: flash 0.8s ease-in-out 5; }
        .assinatura { position: absolute; bottom: 8px; left: 15px; font-size: 0.65rem; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body id="corpo-tv">
    <div id="aviso-inicial" onclick="this.style.display='none'" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:999; display:flex; justify-content:center; align-items:center; cursor:pointer;">
        <h1 style="color:#ffcc00">CLIQUE PARA ATIVAR O SOM</h1>
    </div>
    <div class="topo">
        <div class="unidade-nome"><h1>USF Cristo Redentor</h1></div>
        <div id="relogio" class="relogio">00:00:00</div>
    </div>
    <div class="layout-principal">
        <div class="area-chamada">
            <div id="conteudo-normal">
                <h1 style="font-size:3.5rem;">Bem-vindo</h1>
            </div>
            <div id="conteudo-chamada" style="display:none">
                <div id="txtPaciente" class="paciente">--</div>
                <div id="txtSala" class="sala">--</div>
            </div>
            <div class="assinatura">Desenvolvido por Lucas Freitas Gomes &copy; 2026</div>
        </div>
        <div class="area-lateral">
            <div class="hist-titulo">ÚLTIMOS CHAMADOS</div>
            <div id="painel-historico"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhXaVoK92AW03ltyYa5JwSZKXtAFylgYs",
            authDomain: "painel-usf-224a5.firebaseapp.com",
            projectId: "painel-usf-224a5",
            databaseURL: "https://painel-usf-224a5-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const som = new Audio('https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3');
        let histTv = [];

        database.ref('fila_chamadas').on('child_added', (snap) => {
            const dados = snap.val();
            database.ref('fila_chamadas/' + snap.key).remove();
            chamar(dados);
        });

        function chamar(dados) {
            document.getElementById('conteudo-normal').style.display = 'none';
            document.getElementById('conteudo-chamada').style.display = 'block';
            document.getElementById('txtPaciente').innerText = dados.msg;
            document.getElementById('txtSala').innerText = dados.local;
            document.getElementById('corpo-tv').classList.add('piscar');
            som.play();
            
            const voz = new SpeechSynthesisUtterance(`Paciente ${dados.msg}, comparecer à ${dados.local}`);
            voz.lang = 'pt-BR';
            window.speechSynthesis.speak(voz);

            atualizarHistorico(dados.msg, dados.local);

            setTimeout(() => {
                document.getElementById('corpo-tv').classList.remove('piscar');
                document.getElementById('conteudo-normal').style.display = 'block';
                document.getElementById('conteudo-chamada').style.display = 'none';
            }, 8000);
        }

        function atualizarHistorico(msg, local) {
            histTv.unshift({msg, local}); if(histTv.length > 5) histTv.pop();
            const p = document.getElementById('painel-historico'); p.innerHTML = "";
            histTv.forEach(h => { p.innerHTML += `<div class="hist-item-tv"><b>${h.msg}</b><br><small>${h.local}</small></div>`; });
        }
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    </script>
</body>
</html>
