<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TV - USF Cristo Redentor</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #002b5c; color: white; font-family: sans-serif; text-align: center; height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .topo { background: #001a38; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #ffcc00; }
        .unidade-nome h1 { font-size: 2rem; margin: 0; color: white; font-weight: 900; }
        .relogio { font-size: 3rem; color: #ffcc00; font-weight: bold; }
        .conteudo { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .paciente { font-size: 8rem; font-weight: bold; color: #ffcc00; text-transform: uppercase; }
        .sala { font-size: 5rem; background: white; color: #002b5c; padding: 10px 60px; border-radius: 20px; display: inline-block; margin-top: 25px; font-weight: bold; }
        @keyframes flash { 0%, 100% { background-color: #002b5c; } 50% { background-color: #ffcc00; } }
        .piscar { animation: flash 0.8s ease-in-out 5; }
        .assinatura { position: absolute; bottom: 10px; right: 15px; font-size: 0.7rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body id="corpo">
    <div id="aviso" onclick="this.style.display='none'" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; display:flex; justify-content:center; align-items:center; cursor:pointer;">
        <h2 style="color:#ffcc00">CLIQUE AQUI PARA ATIVAR O SOM DA TV</h2>
    </div>
    <div class="topo">
        <div class="unidade-nome"><h1>USF Cristo Redentor</h1></div>
        <div id="relogio" class="relogio">00:00:00</div>
    </div>
    <div class="conteudo">
        <div id="area-tv" style="display:none">
            <div id="txtPaciente" class="paciente">--</div>
            <div id="txtSala" class="sala">AGUARDE</div>
        </div>
        <div id="bem-vindo"><h1>Bem-vindo à Unidade</h1></div>
    </div>
    <div class="assinatura">Desenvolvido por Lucas Freitas Gomes &copy; 2026</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhXaVoK92AW03ltyYa5JwSZKXtAFylgYs",
            authDomain: "painel-usf-224a5.firebaseapp.com",
            projectId: "painel-usf-224a5",
            databaseURL: "https://painel-usf-224a5-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const som = new Audio('https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3');

        database.ref('fila_chamadas').on('child_added', (snap) => {
            const dados = snap.val();
            database.ref('fila_chamadas/' + snap.key).remove();
            exibir(dados);
        });

        function exibir(dados) {
            document.getElementById('area-tv').style.display = 'block';
            document.getElementById('bem-vindo').style.display = 'none';
            document.getElementById('txtPaciente').innerText = dados.msg;
            document.getElementById('txtSala').innerText = dados.local;
            document.getElementById('corpo').classList.add('piscar');
            som.play();
            
            const voz = new SpeechSynthesisUtterance(`Paciente ${dados.msg}, comparecer à ${dados.local}`);
            voz.lang = 'pt-BR';
            window.speechSynthesis.speak(voz);

            setTimeout(() => {
                document.getElementById('corpo').classList.remove('piscar');
                document.getElementById('area-tv').style.display = 'none';
                document.getElementById('bem-vindo').style.display = 'block';
            }, 8000);
        }
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    </script>
</body>
</html>
